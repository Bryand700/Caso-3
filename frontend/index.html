<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#101715">
  <meta name="description" content="Gathel — Gaming the life">
  <title>Gathel — Gaming the life</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app"></div>

  <svg class="svg-sprite" aria-hidden="true">
    <symbol id="i-grid" viewBox="0 0 24 24">
      <rect x="3" y="3" width="7" height="7" rx="2"></rect>
      <rect x="14" y="3" width="7" height="7" rx="2"></rect>
      <rect x="3" y="14" width="7" height="7" rx="2"></rect>
      <rect x="14" y="14" width="7" height="7" rx="2"></rect>
    </symbol>
    <symbol id="i-spark" viewBox="0 0 24 24">
      <path d="M12 3l1.5 5.5L19 10l-5.5 1.5L12 17l-1.5-5.5L5 10l5.5-1.5L12 3z"></path>
      <path d="M19 16l.7 2.3L22 19l-2.3.7L19 22l-.7-2.3L16 19l2.3-.7L19 16z"></path>
    </symbol>
    <symbol id="i-plus" viewBox="0 0 24 24">
      <path d="M12 5v14M5 12h14"></path>
    </symbol>
    <symbol id="i-trophy" viewBox="0 0 24 24">
      <path d="M8 4h8v5a4 4 0 01-8 0V4z"></path>
      <path d="M8 6H5v2a4 4 0 004 4M16 6h3v2a4 4 0 01-4 4M12 13v4M8 21h8M9 17h6v4H9z"></path>
    </symbol>
    <symbol id="i-clock" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9"></circle>
      <path d="M12 7v5l3 2"></path>
    </symbol>
    <symbol id="i-user" viewBox="0 0 24 24">
      <circle cx="12" cy="8" r="4"></circle>
      <path d="M4 21a8 8 0 0116 0"></path>
    </symbol>
    <symbol id="i-wallet" viewBox="0 0 24 24">
      <path d="M4 6h14a2 2 0 012 2v10a2 2 0 01-2 2H5a3 3 0 01-3-3V6a3 3 0 013-3h12"></path>
      <path d="M15 11h7v5h-7a2.5 2.5 0 010-5z"></path>
    </symbol>
    <symbol id="i-arrow" viewBox="0 0 24 24">
      <path d="M5 12h14M14 7l5 5-5 5"></path>
    </symbol>
    <symbol id="i-chevron" viewBox="0 0 24 24">
      <path d="M9 6l6 6-6 6"></path>
    </symbol>
    <symbol id="i-search" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="7"></circle>
      <path d="M20 20l-4-4"></path>
    </symbol>
    <symbol id="i-bell" viewBox="0 0 24 24">
      <path d="M18 8a6 6 0 00-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4"></path>
    </symbol>
    <symbol id="i-logout" viewBox="0 0 24 24">
      <path d="M10 5H5a2 2 0 00-2 2v10a2 2 0 002 2h5M14 8l4 4-4 4M8 12h10"></path>
    </symbol>
    <symbol id="i-image" viewBox="0 0 24 24">
      <rect x="3" y="4" width="18" height="16" rx="3"></rect>
      <circle cx="9" cy="10" r="2"></circle>
      <path d="M3 17l5-4 4 3 3-2 6 4"></path>
    </symbol>
    <symbol id="i-check" viewBox="0 0 24 24">
      <path d="M5 12l4 4L19 6"></path>
    </symbol>
    <symbol id="i-x" viewBox="0 0 24 24">
      <path d="M6 6l12 12M18 6L6 18"></path>
    </symbol>
    <symbol id="i-link" viewBox="0 0 24 24">
      <path d="M10 13a5 5 0 007 0l2-2a5 5 0 00-7-7l-1 1"></path>
      <path d="M14 11a5 5 0 00-7 0l-2 2a5 5 0 007 7l1-1"></path>
    </symbol>
    <symbol id="i-info" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9"></circle>
      <path d="M12 11v6M12 7h.01"></path>
    </symbol>
    <symbol id="i-menu" viewBox="0 0 24 24">
      <path d="M4 7h16M4 12h16M4 17h16"></path>
    </symbol>
  </svg>

  <script type="module" src="./app.js"></script>
</body>
</html>
